<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>For You</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cream:#faf8f4;--warm:#f2ede4;--text:#26211c;--muted:#9a9088;--accent:#b8845a;--border:rgba(38,33,28,0.1);}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;padding:2rem;text-align:center;z-index:1;}
.screen.active{display:flex;animation:fu .6s ease forwards}
@keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
h1{font-family:'DM Serif Display',serif;font-size:2.3rem;font-weight:400;letter-spacing:-.02em;line-height:1.25;color:var(--text)}
h1 em{font-style:italic;color:var(--accent)}
p{font-size:.9rem;color:var(--muted);max-width:300px;line-height:1.8;font-weight:300}
.quote{font-family:'DM Serif Display',serif;font-style:italic;font-size:1.1rem;color:var(--text);max-width:300px;line-height:1.85;opacity:.85;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 28px;font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:400;letter-spacing:.03em;color:var(--text);background:transparent;border:1px solid var(--border);border-radius:100px;cursor:pointer;transition:background .2s,border-color .2s,transform .1s;}
.btn:hover{background:var(--warm);border-color:rgba(38,33,28,.2)}
.btn:active{transform:scale(.97)}
.inputs{display:flex;flex-direction:column;gap:10px;width:220px}
input{font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:300;padding:11px 16px;text-align:center;background:var(--warm);border:1px solid var(--border);border-radius:12px;color:var(--text);outline:none;transition:border-color .2s;}
input::placeholder{color:var(--muted)}
input:focus{border-color:var(--accent)}
.err{font-size:.78rem;color:#b05040;display:none}
.arrow-hint{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:.5rem;cursor:pointer;}
.arrow-hint span{font-size:.75rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;font-weight:300;}
.arrow{width:28px;height:28px;border-right:1.5px solid var(--accent);border-bottom:1.5px solid var(--accent);transform:rotate(45deg);animation:bounce 1.4s ease-in-out infinite;opacity:.7;}
@keyframes bounce{0%,100%{transform:rotate(45deg) translateY(0)}50%{transform:rotate(45deg) translateY(6px)}}
#slideWrap{width:260px;height:260px;border-radius:20px;overflow:hidden;position:relative;background:var(--warm);flex-shrink:0;}
#slideWrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity 1.2s ease}
.music-bar{display:none;align-items:center;gap:12px;padding:9px 18px;background:var(--warm);border:1px solid var(--border);border-radius:100px;font-size:.78rem;color:var(--muted);}
.music-dots{display:flex;gap:3px;align-items:flex-end;height:16px}
.music-dots span{width:3px;background:var(--accent);border-radius:2px;animation:wv 1s ease-in-out infinite alternate}
.music-dots span:nth-child(1){height:5px;animation-delay:0s}
.music-dots span:nth-child(2){height:12px;animation-delay:.15s}
.music-dots span:nth-child(3){height:7px;animation-delay:.3s}
.music-dots span:nth-child(4){height:14px;animation-delay:.45s}
.music-dots span:nth-child(5){height:5px;animation-delay:.6s}
@keyframes wv{from{transform:scaleY(1)}to{transform:scaleY(.25)}}
.thankyou{font-family:'DM Serif Display',serif;font-size:1.6rem;font-weight:400;color:var(--text);letter-spacing:-.01em;}
#cc{position:fixed;inset:0;pointer-events:none;z-index:999}
.ornament{font-family:'DM Serif Display',serif;font-style:italic;font-size:.95rem;color:var(--accent);opacity:.5;letter-spacing:.1em}
</style>
</head>
<body>
<canvas id="cc"></canvas>

<div class="screen active" id="s1">
  <span class="ornament">a little something</span>
  <h1>What is your<br><em>name</em>?</h1>
  <div class="inputs">
    <input id="bname" type="text" placeholder="Your name" maxlength="30"/>
  </div>
  <p class="err" id="berr">Please enter your name.</p>
  <button class="btn" onclick="greet()">Continue &rarr;</button>
</div>

<div class="screen" id="s2">
  <h1 id="greetMsg"></h1>
  <p class="quote">&ldquo;You are such a heart-warming person I have ever met in my life.&rdquo;&nbsp; :)</p>
  <div class="arrow-hint" onclick="goFinal()">
    <span>one more surprise for you</span>
    <div class="arrow"></div>
  </div>
</div>

<div class="screen" id="s3">
  <p class="thankyou">Thank you for Everything.</p>
  <div id="slideWrap"></div>
  <div class="music-bar" id="mbar">
    <div class="music-dots"><span></span><span></span><span></span><span></span><span></span></div>
    <span>Someone Out of Town &mdash; Yuna</span>
  </div>
</div>

<audio id="bgm" loop preload="auto">
  <source src="Yuna%20-%20Someone%20Out%20Of%20Town%20HQ.mp3" type="audio/mpeg">
</audio>

<script>
let _name='';
function go(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById('s'+n);
  void el.offsetWidth;
  el.classList.add('active');
}
function greet(){
  const n=document.getElementById('bname').value.trim();
  const err=document.getElementById('berr');
  if(!n){err.style.display='block';return;}
  err.style.display='none';
  _name=n;
  document.getElementById('greetMsg').innerHTML='Finally you are here,<br><em>'+n+'</em>.';
  go(2);boom();
}
function goFinal(){
  go(3);
  startSlideshow();
  playMusic();
}

function startSlideshow(){
  const wrap=document.getElementById('slideWrap');wrap.innerHTML='';
  PHOTOS.forEach((src,i)=>{
    const img=new Image();img.src=src;
    img.style.opacity=i===0?1:0;
    wrap.appendChild(img);
  });
  let cur=0;
  setInterval(()=>{
    const imgs=wrap.querySelectorAll('img');
    imgs[cur].style.opacity=0;
    cur=(cur+1)%imgs.length;
    imgs[cur].style.opacity=1;
  },3500);
}
function playMusic(){
  const bgm=document.getElementById('bgm');
  bgm.volume=0;
  const tryPlay = () => {
    bgm.play().then(()=>{
      document.getElementById('mbar').style.display='flex';
      let v=0;
      const fade=setInterval(()=>{v=Math.min(v+0.04,0.8);bgm.volume=v;if(v>=0.8)clearInterval(fade);},150);
    }).catch(e=>{
      console.log('Audio error:', e);
    });
  };
  tryPlay();
}
function boom(){
  const cv=document.getElementById('cc');const ctx=cv.getContext('2d');
  cv.width=window.innerWidth;cv.height=window.innerHeight;
  const cols=['#b8845a','#d4aa82','#8b6040','#e8d0b0','#a07050','#f0e8d8'];
  const ps=[];
  for(let i=0;i<65;i++) ps.push({x:Math.random()*cv.width,y:-10-Math.random()*60,w:4+Math.random()*5,h:7+Math.random()*7,col:cols[i%cols.length],s:1.5+Math.random()*2.5,a:Math.random()*Math.PI*2,sp:(.015+Math.random()*.035)*(Math.random()<.5?1:-1),dr:(Math.random()-.5)*1.2});
  let fr=0;
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    ps.forEach(p=>{ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a);ctx.fillStyle=p.col;ctx.globalAlpha=0.65;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();p.y+=p.s;p.x+=p.dr;p.a+=p.sp;});
    fr++;
    if(fr<190)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,cv.width,cv.height);
  }
  draw();
}
